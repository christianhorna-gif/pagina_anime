<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crear cuenta</title>
    <link rel="stylesheet" href="crear_cuenta.css">
</head>
<body>

      <header>
        <h1>Crear Cuenta</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="crear_cuenta.html">Crear Cuenta</a>
            <a href="iniciar_sesion.html" class="activo">Iniciar Sesión</a>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>Crear Cuenta</h2>
 
            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Tu nombre completo">
            </div>
 
            <div class="campo">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="tucorreo@ejemplo.com">
            </div>
 
            <div class="campo">
                <label for="contraseña">contraseña</label>
                <input type="password" id="contraseña" placeholder="Tu contraseña">
            </div>

            <div class="campo">
                <label for="confirma_contraseña">Confirmar contraseña</label>
                <input type="password" id="confirma_contraseña" placeholder="Confirma tu contraseña">
            </div>
 
            <button type="submit">Enviar</button> 
            
           
        </div>
    </main>
</body>
</html>
